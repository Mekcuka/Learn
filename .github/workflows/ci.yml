name: CI

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        env:
          VITE_BASE_PATH: /Learn/
          VITE_API_URL: ""
        run: npm run build

      - name: Bundle size budget
        run: node scripts/check-bundle-size.mjs

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: learn
          POSTGRES_PASSWORD: learn
          POSTGRES_DB: learn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: "true"
      DATABASE_URL: postgresql://learn:learn@localhost:5432/learn
      SECRET_KEY: ci-e2e-secret-key
      AUTH_ENABLED: "false"
      SEED_ON_STARTUP: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Alembic upgrade head
        working-directory: backend
        run: alembic upgrade head

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: learn
          POSTGRES_PASSWORD: learn
          POSTGRES_DB: learn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TESTING: "1"
      SECRET_KEY: ci-test-secret-key
      AUTH_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install
        run: pip install -r requirements.txt

      - name: Alembic upgrade head
        env:
          DATABASE_URL: postgresql://learn:learn@localhost:5432/learn
        run: alembic upgrade head

      - name: Pytest (SQLite)
        env:
          DATABASE_URL: sqlite://
        run: pytest tests/ -q

      - name: Pytest (PostgreSQL, critical)
        env:
          DATABASE_URL: postgresql://learn:learn@localhost:5432/learn
        run: pytest tests/test_author_phase3.py tests/test_wiki.py tests/test_self_study.py -q
